# karibteck.com — vhost nginx (site statique Astro)
# À adapter puis installer dans /etc/nginx/sites-available/ (voir docs/deploy/vps.md).
# certbot --nginx ajoutera automatiquement le bloc TLS (listen 443 + certificats).

server {
    listen 80;
    listen [::]:80;
    server_name karibteck.com www.karibteck.com;

    root /var/www/karibteck;
    index index.html;

    # Redirige www vers apex (à faire confirmer côté SEO/canonical).
    if ($host = www.karibteck.com) {
        return 301 https://karibteck.com$request_uri;
    }

    # Astro génère des URLs "propres" : /a-propos/ -> /a-propos/index.html
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Page 404 personnalisée (src/pages/404.astro)
    error_page 404 /404.html;

    # Cache long pour les assets fingerprintés (immutables)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    # En-têtes de sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
